<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-success px-3">
        <span class="navbar-brand mb-0 h1">Teacher Dashboard</span>
        <div>
            <span class="text-light me-3">{{ teacher.first_name }} {{ teacher.last_name }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">My Profile</div>
            <div class="card-body">
                <p><strong>Name:</strong> {{ teacher.first_name }} {{ teacher.last_name }}</p>
                <p><strong>Email:</strong> {{ teacher.email }}</p>
                <p><strong>Phone:</strong> {{ teacher.phone }}</p>
                <p><strong>Hire Date:</strong> {{ teacher.hire_date }}</p>
            </div>
        </div>
    </div>
</body>
</html>
