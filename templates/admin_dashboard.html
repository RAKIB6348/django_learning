<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">Admin Dashboard</span>
        <div>
            <span class="text-light me-3">{{ request.user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card text-bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Django Admin</h5>
                        <p class="card-text">Manage users, teachers, students.</p>
                        <a href="{% url 'admin:index' %}" class="btn btn-light">Go to Admin</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Teachers</h5>
                        <p class="card-text">View and manage teacher records.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-bg-info">
                    <div class="card-body">
                        <h5 class="card-title">Students</h5>
                        <p class="card-text">View and manage student records.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
