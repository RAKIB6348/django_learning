<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">School Management</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <ul class="nav nav-pills nav-justified mb-4" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link {% if active_tab == 'admin' %}active{% endif %}"
                                        data-bs-toggle="pill"
                                        data-bs-target="#tab-admin"
                                        type="button"
                                        role="tab"
                                        aria-selected="{% if active_tab == 'admin' %}true{% else %}false{% endif %}">
                                    Admin
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link {% if active_tab == 'teacher' %}active{% endif %}"
                                        data-bs-toggle="pill"
                                        data-bs-target="#tab-teacher"
                                        type="button"
                                        role="tab"
                                        aria-selected="{% if active_tab == 'teacher' %}true{% else %}false{% endif %}">
                                    Teacher
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link {% if active_tab == 'student' %}active{% endif %}"
                                        data-bs-toggle="pill"
                                        data-bs-target="#tab-student"
                                        type="button"
                                        role="tab"
                                        aria-selected="{% if active_tab == 'student' %}true{% else %}false{% endif %}">
                                    Student
                                </button>
                            </li>
                        </ul>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <div class="tab-content">
                            {% for role in roles %}
                                <div class="tab-pane fade {% if active_tab == role.id %}show active{% endif %}"
                                     id="tab-{{ role.id }}"
                                     role="tabpanel">
                                    <form method="post">
                                        {% csrf_token %}
                                        <input type="hidden" name="role" value="{{ role.id }}">

                                        <div class="mb-3">
                                            <label for="username-{{ role.id }}" class="form-label">Username</label>
                                            <input type="text"
                                                   class="form-control"
                                                   id="username-{{ role.id }}"
                                                   name="username"
                                                   required
                                                   autofocus>
                                        </div>

                                        <div class="mb-3">
                                            <label for="password-{{ role.id }}" class="form-label">Password</label>
                                            <input type="password"
                                                   class="form-control"
                                                   id="password-{{ role.id }}"
                                                   name="password"
                                                   required>
                                        </div>

                                        <button type="submit" class="btn btn-primary w-100">
                                            Sign in as {{ role.label }}
                                        </button>
                                    </form>
                                </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
